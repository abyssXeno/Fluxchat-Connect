<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxchat Connect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        p {
            color: #666;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .button {
            display: inline-block;
            padding: 12px 30px;
            margin: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1em;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        
        .feature {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            color: #333;
        }
        
        .feature h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Fluxchat Connect</h1>
        <p>Bienvenue sur Fluxchat Connect - Votre plateforme de communication en temps réel</p>
        
        <button class="button" onclick="alert('Connexion')">Se Connecter</button>
        <button class="button" onclick="alert('Inscription')">S'Inscrire</button>
        
        <div class="features">
            <div class="feature">
                <h3>💬 Chat</h3>
                <p>Messagerie instantanée</p>
            </div>
            <div class="feature">
                <h3>👥 Communauté</h3>
                <p>Connectez-vous avec d'autres</p>
            </div>
            <div class="feature">
                <h3>⚡ Rapide</h3>
                <p>Performance optimale</p>
            </div>
            <div class="feature">
                <h3>🔒 Sécurisé</h3>
                <p>Vos données protégées</p>
            </div>
        </div>
    </div>
</body>
</html>
